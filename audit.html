<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure System Audit</title>
<style>
  body {
    margin: 0;
    font-family: monospace;
    background: black;
    color: #00ffcc;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  #box {
    text-align: center;
    width: 95%;
    max-width: 600px;
  }

  #log {
    text-align: left;
    height: 120px;
    overflow: hidden;
    font-size: 0.85rem;
    margin-top: 15px;
    opacity: 0.8;
  }

  #progressBar {
    width: 100%;
    height: 18px;
    border: 1px solid #00ffcc;
    margin-top: 15px;
  }

  #progress {
    height: 100%;
    width: 0%;
    background: #00ffcc;
  }

  #fakeBtn {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 1rem;
    cursor: pointer;
    border: none;
    background: #00ffcc;
    color: black;
  }

  .glitch {
    font-size: 2rem;
    animation: glitch 0.12s infinite;
  }

  @keyframes glitch {
    0% { transform: translate(1px, -1px); }
    25% { transform: translate(-1px, 1px); }
    50% { transform: translate(2px, 0); }
    75% { transform: translate(-2px, -1px); }
    100% { transform: translate(1px, 1px); }
  }

  #countdown {
    display: none;
    font-size: 2rem;
    color: red;
    margin-top: 10px;
  }

  #camera {
    display: none;
    color: red;
    margin-top: 10px;
  }
</style>
</head>
<body>
  <div id="box">
    <div id="text">Run security audit?</div>
    <button id="fakeBtn" onclick="startPrank()">Start</button>

    <div id="progressBar"><div id="progress"></div></div>
    <div id="countdown"></div>
    <div id="camera">📷 Camera access granted</div>
    <div id="log"></div>
  </div>

<script>
const fakeFiles = [
  "photos/embarrassing_selfie.png",
  "chat_logs/private_chat.txt",
  "downloads/memes.zip",
  "notes/secrets.txt",
  "history/late_night_searches.json"
];

function addLog(text) {
  const log = document.getElementById('log');
  log.innerHTML += text + "<br>";
  log.scrollTop = log.scrollHeight;
}

function startPrank() {
  document.getElementById('fakeBtn').style.display = 'none';

  const text = document.getElementById('text');
  const progress = document.getElementById('progress');
  const countdown = document.getElementById('countdown');
  const camera = document.getElementById('camera');

  let percent = 0;

  const interval = setInterval(() => {
    percent += Math.floor(Math.random() * 8) + 4;
    if (percent > 100) percent = 100;

    progress.style.width = percent + "%";

    if (percent < 25) {
      text.innerText = "Scanning device...";
      addLog("[OK] System directories mapped");
    } else if (percent < 50) {
      text.innerText = "Extracting personal files...";
      addLog("[FOUND] " + fakeFiles[Math.floor(Math.random()*fakeFiles.length)]);
    } else if (percent < 75) {
      text.innerText = "Uploading data...";
      camera.style.display = "block";
      addLog("[UPLOAD] Sending encrypted packet...");
    } else if (percent < 100) {
      text.innerText = "Injecting exploit...";
      addLog("[WARNING] Firewall bypassed");
    } else {
      clearInterval(interval);
      text.classList.add('glitch');
      text.innerText = "⚠ SYSTEM BREACH DETECTED ⚠";

      startCountdown();
    }
  }, 400);
}

function startCountdown() {
  const countdown = document.getElementById('countdown');
  countdown.style.display = 'block';

  let time = 5;
  countdown.innerText = "Self-destruct in: " + time;

  const timer = setInterval(() => {
    time--;
    countdown.innerText = "Self-destruct in: " + time;

    if (time <= 0) {
      clearInterval(timer);
      document.body.style.background = "white";
      document.body.style.color = "black";
      document.body.innerHTML = "<h1 style='text-align:center;margin-top:20%;'>😂 APRIL FOOLS ISHAH 😂</h1>";
    }
  }, 1000);
}
</script>
</body>
</html>
