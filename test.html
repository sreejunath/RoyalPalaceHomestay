<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hugs for Ishah 🐱💕</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body {
  min-height:100vh;
  background: #fff0f6;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  font-family:'Quicksand',sans-serif;
  overflow:hidden;
  cursor:pointer;
  position:relative;
}

/* BG gradient animated */
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse at 15% 15%, #ffd6e8 0%, transparent 55%),
    radial-gradient(ellipse at 85% 80%, #e8d6ff 0%, transparent 55%),
    radial-gradient(ellipse at 70% 10%, #ffe4d6 0%, transparent 45%),
    #fff0f6;
  animation: bgShift 8s ease-in-out infinite alternate;
  z-index:0;
}
@keyframes bgShift {
  0%  { filter: hue-rotate(0deg) brightness(1); }
  100%{ filter: hue-rotate(15deg) brightness(1.04); }
}

/* floating particles */
#particles { position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden; }
.particle {
  position:absolute;
  font-size:1.1rem;
  opacity:0;
  animation: particleFly linear infinite;
  user-select:none;
}
@keyframes particleFly {
  0%   { transform: translateY(110vh) rotate(0deg) scale(.7); opacity:0; }
  5%   { opacity:.9; }
  90%  { opacity:.7; }
  100% { transform: translateY(-10vh) rotate(360deg) scale(1.1); opacity:0; }
}

/* ── CARD ── */
.card {
  position:relative; z-index:10;
  background:rgba(255,255,255,.82);
  backdrop-filter:blur(28px);
  border-radius:44px;
  padding:36px 44px 40px;
  max-width:420px; width:92%;
  text-align:center;
  box-shadow:
    0 0 0 2px rgba(255,190,210,.5),
    0 20px 70px rgba(255,130,180,.18),
    0 6px 20px rgba(0,0,0,.06);
  animation: cardPop .75s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes cardPop {
  from{ opacity:0; transform:scale(.5) translateY(60px); }
  to  { opacity:1; transform:scale(1) translateY(0); }
}

/* ── KITTY SVG WRAPPER ── */
.kitty-wrap {
  position:relative;
  display:inline-block;
  margin-bottom:10px;
  cursor:pointer;
  user-select:none;
}

#kitty-svg {
  width:200px; height:220px;
  filter: drop-shadow(0 12px 24px rgba(220,100,150,.25));
  animation: kittyBob 2.5s ease-in-out infinite;
  transition: transform .15s;
  overflow:visible;
}
@keyframes kittyBob {
  0%,100%{ transform: translateY(0) rotate(-.8deg); }
  50%    { transform: translateY(-10px) rotate(.8deg); }
}
#kitty-svg:active { transform: scale(.93) !important; }

/* Speech bubble */
.speech {
  position:absolute;
  top:-54px; left:50%;
  transform: translateX(-50%) scale(0);
  transform-origin: bottom center;
  background:#fff;
  border:2.5px solid #ffaac5;
  border-radius:20px;
  padding:8px 16px;
  font-size:.82rem; font-weight:700;
  color:#c0506a;
  white-space:nowrap;
  box-shadow:0 4px 18px rgba(255,120,160,.2);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  z-index:30;
  pointer-events:none;
}
.speech::after {
  content:'';
  position:absolute; bottom:-11px; left:50%;
  transform:translateX(-50%);
  border:9px solid transparent;
  border-top-color:#fff;
  border-bottom:none;
  filter:drop-shadow(0 2.5px 0 #ffaac5);
}
.speech.show { transform: translateX(-50%) scale(1); }

/* ── TEXT ── */
.for-label {
  font-size:.72rem; letter-spacing:.18em; text-transform:uppercase;
  color:#d090a8; font-weight:800; margin-bottom:2px;
}
h1 {
  font-family:'Nunito',sans-serif;
  font-size:2.6rem; font-weight:900;
  color:#4a2038; line-height:1.05;
  margin-bottom:10px;
}
.ishah {
  color:#ff5c8a;
  display:inline-block;
  animation:namePop 2s ease-in-out infinite;
  text-shadow:0 3px 14px rgba(255,80,130,.22);
}
@keyframes namePop {
  0%,100%{ transform:rotate(-2deg) scale(1.02); }
  50%    { transform:rotate(2deg) scale(1.06); }
}

.msg-card {
  background:linear-gradient(135deg,rgba(255,220,235,.45),rgba(230,210,255,.35));
  border:1.5px solid rgba(255,190,215,.6);
  border-radius:20px;
  padding:14px 18px;
  margin:8px 0 20px;
  font-size:.96rem; color:#5a3048;
  line-height:1.7; font-weight:600;
}
.msg-card .erow { font-size:1.3rem; margin-bottom:5px; }

.from-sig {
  font-family:'Nunito',sans-serif;
  font-size:1.05rem; font-weight:800;
  color:#b05880; margin-top:10px;
}
.from-sig .sree {
  color:#ff5c8a; font-size:1.2rem;
  display:inline-block;
  animation:namePop 2s ease-in-out infinite .6s;
}

.hint {
  font-size:.72rem; color:#d0a8b8;
  margin-top:14px; font-style:italic;
}

/* ── BURST particles ── */
.burst-dot {
  position:fixed; pointer-events:none;
  font-size:1.5rem; z-index:200;
  animation: burstFly .9s ease-out forwards;
}
@keyframes burstFly {
  0%  { opacity:1; transform:translate(0,0) scale(1); }
  100%{ opacity:0; transform:translate(var(--tx),var(--ty)) scale(.2); }
}

/* Ripple */
.ripple {
  position:fixed; pointer-events:none; z-index:150;
  border-radius:50%;
  border:3px solid rgba(255,120,170,.6);
  width:10px; height:10px;
  margin-left:-5px; margin-top:-5px;
  animation:rippleOut .7s ease-out forwards;
}
@keyframes rippleOut {
  to { width:120px;height:120px;margin-left:-60px;margin-top:-60px;opacity:0;border-width:1px; }
}
</style>
</head>

<script>
// ══════════════════════════════
//  WEB AUDIO — Sound Engine
// ══════════════════════════════
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playPurr() {
  try {
    const ac = getAudio();
    // Purr = low freq oscillator with LFO tremolo
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    const lfo = ac.createOscillator();
    const lfoGain = ac.createGain();

    lfo.frequency.setValueAtTime(28, ac.currentTime); // purr rate
    lfoGain.gain.setValueAtTime(.3, ac.currentTime);
    lfo.connect(lfoGain);
    lfoGain.connect(gain.gain);

    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(90, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(70, ac.currentTime + .8);

    gain.gain.setValueAtTime(.12, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, ac.currentTime + .9);

    osc.connect(gain);
    gain.connect(ac.destination);

    lfo.start(); osc.start();
    lfo.stop(ac.currentTime + .9);
    osc.stop(ac.currentTime + .9);
  } catch(e) {}
}

function playMeow() {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();

    osc.type = 'sine';
    // Meow pitch sweep
    osc.frequency.setValueAtTime(420, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(680, ac.currentTime + .12);
    osc.frequency.exponentialRampToValueAtTime(360, ac.currentTime + .35);
    osc.frequency.exponentialRampToValueAtTime(280, ac.currentTime + .55);

    gain.gain.setValueAtTime(0, ac.currentTime);
    gain.gain.linearRampToValueAtTime(.22, ac.currentTime + .05);
    gain.gain.setValueAtTime(.22, ac.currentTime + .3);
    gain.gain.exponentialRampToValueAtTime(.001, ac.currentTime + .6);

    osc.connect(gain);
    gain.connect(ac.destination);

    osc.start(); osc.stop(ac.currentTime + .65);
  } catch(e) {}
}

function playChime() {
  try {
    const ac = getAudio();
    const freqs = [523, 659, 784, 1047]; // C E G C
    freqs.forEach((f, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(f, ac.currentTime + i * .1);
      gain.gain.setValueAtTime(0, ac.currentTime + i * .1);
      gain.gain.linearRampToValueAtTime(.15, ac.currentTime + i*.1 + .02);
      gain.gain.exponentialRampToValueAtTime(.001, ac.currentTime + i*.1 + .6);
      osc.connect(gain); gain.connect(ac.destination);
      osc.start(ac.currentTime + i * .1);
      osc.stop(ac.currentTime + i * .1 + .65);
    });
  } catch(e) {}
}

function playPop() {
  try {
    const ac = getAudio();
    const buf = ac.createBuffer(1, ac.sampleRate * .08, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random()*2-1) * Math.exp(-i / (ac.sampleRate*.015));
    }
    const src = ac.createBufferSource();
    const gain = ac.createGain();
    const bq = ac.createBiquadFilter();
    bq.type = 'bandpass'; bq.frequency.value = 1200; bq.Q.value = 1.5;
    src.buffer = buf;
    gain.gain.setValueAtTime(.35, ac.currentTime);
    src.connect(bq); bq.connect(gain); gain.connect(ac.destination);
    src.start();
  } catch(e) {}
}

const sounds = [playMeow, playPurr, playChime, playMeow, playPurr, playPop, playChime];
let soundIdx = 0;

// ══════════════════════════════
//  BLINK ANIMATION (JS driven)
// ══════════════════════════════
const blinkL = document.getElementById('blinkL');
const blinkR = document.getElementById('blinkR');

function doBlink() {
  const dur = 120;
  let t = 0;
  const steps = [0,2,6,10,12,10,6,2,0];
  const interval = setInterval(() => {
    const ry = steps[Math.floor(t / dur * steps.length)] || 0;
    blinkL.setAttribute('ry', ry);
    blinkR.setAttribute('ry', ry);
    t += dur / steps.length * 1.5;
    if (t >= dur) {
      clearInterval(interval);
      blinkL.setAttribute('ry', 0);
      blinkR.setAttribute('ry', 0);
    }
  }, dur / steps.length);
}

// Blink every 3-5 seconds
function scheduleBlink() {
  setTimeout(() => { doBlink(); scheduleBlink(); }, 3000 + Math.random()*2500);
}
scheduleBlink();

// ══════════════════════════════
//  SPEECH BUBBLE
// ══════════════════════════════
const msgs = [
  "Purrr~~ 🐾",
  "Meow!! I love you Ishah 💕",
  "Sree sends hugs! 🤗",
  "*kneads happily* 🐾",
  "You're so special! 🌸",
  "Big warm snuggles!! 😻",
  "Purrr purrr purrr~ 💖",
  "Stay cozy Ishah! ☕",
  "Mew mew mew!! ✨",
  "You matter so much! 💝",
  "*rolls around cutely* 🐱",
  "Sree loves you lots!! 🌟"
];
let msgIdx = 0;
const speech = document.getElementById('speech');
let speechTimer = null;

function showSpeech(txt) {
  speech.textContent = txt;
  speech.classList.add('show');
  clearTimeout(speechTimer);
  speechTimer = setTimeout(() => speech.classList.remove('show'), 2800);
}

// ══════════════════════════════
//  EMOJI BURST
// ══════════════════════════════
const burstEmoji = ['💖','💕','🌸','✨','🐾','💝','🌷','⭐','🩷','🎀','😻','🫧','🌟'];

function doBurst(cx, cy, count = 12) {
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'burst-dot';
    el.textContent = burstEmoji[Math.floor(Math.random() * burstEmoji.length)];
    const angle = (Math.PI * 2 / count) * i + Math.random() * .5;
    const dist = 60 + Math.random() * 100;
    el.style.left = cx + 'px';
    el.style.top  = cy + 'px';
    el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    el.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    el.style.animationDelay = Math.random() * .18 + 's';
    el.style.fontSize = (.8 + Math.random() * .9) + 'rem';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1100);
  }
}

function doRipple(cx, cy) {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = cx + 'px';
  r.style.top  = cy + 'px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 750);
}

// ══════════════════════════════
//  KITTY SQUISH ANIMATION
// ══════════════════════════════
const kittySvg = document.getElementById('kitty-svg');

function squishKitty() {
  kittySvg.style.transition = 'transform .15s cubic-bezier(.34,1.56,.64,1)';
  kittySvg.style.transform  = 'scale(1.18) rotate(3deg)';
  setTimeout(() => {
    kittySvg.style.transform = 'scale(.9) rotate(-2deg)';
    setTimeout(() => {
      kittySvg.style.transform = '';
      kittySvg.style.transition = '';
    }, 200);
  }, 150);
}

// ══════════════════════════════
//  MAIN INTERACTION
// ══════════════════════════════
function onHug(e) {
  const cx = e.clientX ?? (e.touches?.[0]?.clientX ?? window.innerWidth / 2);
  const cy = e.clientY ?? (e.touches?.[0]?.clientY ?? window.innerHeight / 2);

  squishKitty();
  showSpeech(msgs[msgIdx++ % msgs.length]);
  doBurst(cx, cy);
  doRipple(cx, cy);
  sounds[soundIdx++ % sounds.length]();
}

const kittyWrap = document.getElementById('kittyWrap');
kittyWrap.addEventListener('click',      onHug);
kittyWrap.addEventListener('touchstart', onHug, { passive: true });

// ══════════════════════════════
//  FLOATING BACKGROUND PARTICLES
// ══════════════════════════════
const particleEl = document.getElementById('particles');
const pEmojis = ['💕','🌸','✨','💖','🐾','🌷','🎀','⭐','🩷'];

function spawnParticle() {
  const el = document.createElement('div');
  el.className = 'particle';
  el.textContent = pEmojis[Math.floor(Math.random() * pEmojis.length)];
  el.style.left     = Math.random() * 100 + 'vw';
  el.style.fontSize = (.7 + Math.random() * .9) + 'rem';
  const dur = 7 + Math.random() * 7;
  el.style.animationDuration = dur + 's';
  el.style.animationDelay    = Math.random() * 3 + 's';
  particleEl.appendChild(el);
  setTimeout(() => el.remove(), (dur + 4) * 1000);
}

setInterval(spawnParticle, 700);
for (let i = 0; i < 10; i++) setTimeout(spawnParticle, i * 250);

setTimeout(() => {
  showSpeech("Hi Ishah~! 💕 Tap me!");
}, 1200);
