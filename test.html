<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hugs for Ishah 🐱💕</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  font-family:'Quicksand',sans-serif;
  background:#fff0f6;
  position:relative;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, #ffd6e8 0%, transparent 40%),
    radial-gradient(circle at 80% 80%, #e8d6ff 0%, transparent 40%),
    radial-gradient(circle at 70% 10%, #ffe6d6 0%, transparent 35%),
    #fff0f6;
  animation:bgMove 8s ease-in-out infinite alternate;
}

@keyframes bgMove{
  from{filter:hue-rotate(0deg);}
  to{filter:hue-rotate(15deg);}
}

.card{
  position:relative;
  z-index:10;
  width:92%;
  max-width:430px;
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(20px);
  border-radius:40px;
  padding:30px;
  text-align:center;
  box-shadow:
    0 15px 50px rgba(255,120,170,.18),
    0 5px 15px rgba(0,0,0,.05);
}

.kitty{
  font-size:7rem;
  cursor:pointer;
  user-select:none;
  transition:transform .2s;
  animation:float 2.5s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

.kitty.sad{
  animation:sadShake .5s infinite;
}

@keyframes sadShake{
  0%,100%{transform:rotate(0deg);}
  25%{transform:rotate(-4deg);}
  75%{transform:rotate(4deg);}
}

.speech{
  position:absolute;
  top:-60px;
  left:50%;
  transform:translateX(-50%) scale(0);
  transform-origin:bottom center;
  background:white;
  border:2px solid #ffb0cb;
  padding:10px 16px;
  border-radius:20px;
  font-weight:700;
  color:#c84c74;
  transition:.3s;
  white-space:nowrap;
}

.speech.show{
  transform:translateX(-50%) scale(1);
}

h1{
  margin-top:10px;
  font-family:'Nunito',sans-serif;
  font-size:2.5rem;
  color:#4a2038;
}

.highlight{
  color:#ff5f8e;
}

.msg{
  margin-top:15px;
  background:linear-gradient(135deg,#ffe0ef,#f3e2ff);
  padding:18px;
  border-radius:20px;
  line-height:1.7;
  font-weight:600;
  color:#5c3348;
}

.buttons{
  margin-top:20px;
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

.btn-love{
  border:none;
  padding:13px 28px;
  border-radius:50px;
  font-weight:800;
  font-size:1rem;
  cursor:pointer;
  transition:.2s;
  font-family:'Nunito',sans-serif;
}

.yes{
  background:linear-gradient(135deg,#ff7fb0,#caa8ff);
  color:white;
  box-shadow:0 8px 25px rgba(255,100,160,.35);
}

.yes:hover{
  transform:translateY(-3px) scale(1.05);
}

#denyBtn{
  position:fixed;
  z-index:100;
  background:#f3f3f3;
  color:#777;
  border:2px solid #ddd;
}

.footer{
  margin-top:18px;
  color:#b05d84;
  font-weight:800;
}

.footer span{
  color:#ff5f8e;
}

.emoji{
  position:fixed;
  pointer-events:none;
  font-size:1.4rem;
  animation:fly 1s ease-out forwards;
}

@keyframes fly{
  to{
    transform:translate(var(--x),var(--y)) scale(.2);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="card">

  <div style="position:relative;display:inline-block;">
    <div class="speech" id="speech">Hi Ishah 💕</div>

    <div class="kitty" id="kitty">🐱</div>
  </div>

  <h1>Ishah <span class="highlight">🌸</span></h1>

  <div class="msg">
    🤗 💕 🐾<br><br>
    Hey Ishah, you are so loved and so special.<br>
    Here's the biggest, squishiest hug — straight<br>
    from Sree's heart to yours 💖
  </div>

  <div class="buttons">
    <button class="btn-love yes" onclick="loveYes()">
      🥰 I love Sree too!
    </button>
  </div>

  <button class="btn-love" id="denyBtn">
    😒 I don't love Sree
  </button>

  <div class="footer">
    With all the love, from <span>Sree</span> 🌟
  </div>

</div>

<script>
const kitty = document.getElementById("kitty");
const speech = document.getElementById("speech");
const denyBtn = document.getElementById("denyBtn");

let denyCount = 0;
let sadMode = false;

function showSpeech(text){
  speech.innerText = text;
  speech.classList.add("show");

  clearTimeout(window.speechTimeout);

  window.speechTimeout = setTimeout(()=>{
    speech.classList.remove("show");
  },2500);
}

function burst(x,y,emoji='💖'){
  for(let i=0;i<12;i++){
    const el=document.createElement('div');
    el.className='emoji';
    el.innerText=emoji;

    el.style.left=x+'px';
    el.style.top=y+'px';

    const angle=(Math.PI*2/12)*i;
    const dist=60+Math.random()*60;

    el.style.setProperty('--x',Math.cos(angle)*dist+'px');
    el.style.setProperty('--y',Math.sin(angle)*dist+'px');

    document.body.appendChild(el);

    setTimeout(()=>el.remove(),1000);
  }
}

kitty.addEventListener("click",(e)=>{

  if(sadMode){
    showSpeech("Sree is sad now... 😿");
    burst(e.clientX,e.clientY,'💔');
    return;
  }

  kitty.style.transform='scale(1.2)';

  setTimeout(()=>{
    kitty.style.transform='';
  },180);

  const msgs=[
    "Purrr~ 🐾",
    "You are adorable 💕",
    "Big hugs!! 🤗",
    "Sree loves you 😻",
    "Mew mew 🌸"
  ];

  showSpeech(msgs[Math.floor(Math.random()*msgs.length)]);
  burst(e.clientX,e.clientY);
});

function loveYes(){
  showSpeech("YAYYY!! 😻💖");
  burst(window.innerWidth/2,window.innerHeight/2,'💕');
}

function moveButton(){

  if(sadMode) return;

  denyCount++;

  if(denyCount >= 3){

    sadMode = true;

    denyBtn.innerText = "😢 Okay...";
    denyBtn.style.background = "#ffe5e5";
    denyBtn.style.color = "#c44";

    kitty.classList.add("sad");

    showSpeech("You don't love Sree...? 😿💔");

    return;
  }

  const maxX = window.innerWidth - denyBtn.offsetWidth - 20;
  const maxY = window.innerHeight - denyBtn.offsetHeight - 20;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  denyBtn.style.left = x + "px";
  denyBtn.style.top = y + "px";

  const lines = [
    "Too slow 😹",
    "Nope!! 🐾",
    "Catch me first 😼"
  ];

  showSpeech(lines[denyCount-1]);
}

function placeButton(){
  denyBtn.style.left =
    (window.innerWidth/2 - denyBtn.offsetWidth/2)+'px';

  denyBtn.style.top =
    (window.innerHeight*0.77)+'px';
}

window.addEventListener('load',placeButton);
window.addEventListener('resize',placeButton);

denyBtn.addEventListener('mouseenter',moveButton);
denyBtn.addEventListener('touchstart',moveButton,{passive:false});
denyBtn.addEventListener('click',moveButton);

setTimeout(()=>{
  showSpeech("Tap the kitty 💕");
},1000);

</script>

</body>
</html>
